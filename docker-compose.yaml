
services:
  onvif-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onvif-server
    network_mode: host
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"